<!doctype html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>삼국지 3D 로스터</title>
<style>
  :root{--gold:#e8c463}
  *{margin:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:radial-gradient(120% 90% at 50% 12%,#3a2c1a,#140d07 70%);overflow:hidden;font-family:system-ui,'Malgun Gothic',sans-serif;touch-action:none;user-select:none}
  #c{position:fixed;inset:0;width:100vw;height:100vh;display:block}
  .top{position:fixed;top:calc(env(safe-area-inset-top) + 16px);left:0;right:0;text-align:center;pointer-events:none;z-index:2}
  .eyebrow{color:var(--gold);letter-spacing:.4em;font-size:11px;font-weight:700;opacity:.85}
  .name{color:#fff;font-size:30px;font-weight:800;margin-top:5px;text-shadow:0 2px 14px #000;letter-spacing:-.5px}
  .rar{display:inline-block;margin-top:7px;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.15em}
  .count{position:fixed;top:calc(env(safe-area-inset-top) + 16px);right:16px;color:#e9d7b0;font-size:13px;font-weight:700;opacity:.7;z-index:2}
  .nav{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 26px);left:0;right:0;display:flex;justify-content:center;align-items:center;gap:22px;z-index:3}
  .arw{width:56px;height:56px;border-radius:50%;border:1.5px solid rgba(232,196,99,.5);background:rgba(20,14,8,.6);color:var(--gold);font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(6px)}
  .arw:active{transform:scale(.92);background:rgba(232,196,99,.2)}
  .hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 94px);left:0;right:0;text-align:center;color:#c9b48c;font-size:12.5px;z-index:2;pointer-events:none;opacity:.75}
  .status{position:fixed;top:50%;left:0;right:0;transform:translateY(-50%);text-align:center;color:#e9d7b0;font-size:15px;z-index:1}
  .spin{display:inline-block;width:20px;height:20px;border:2px solid #ffffff33;border-top-color:var(--gold);border-radius:50%;vertical-align:-4px;margin-right:8px;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
</style></head>
<body>
<canvas id="c"></canvas>
<div class="top"><div class="eyebrow">삼국지 랜덤 디펜스 · 3D 로스터</div><div class="name" id="nm">—</div><div class="rar" id="rr"></div></div>
<div class="count" id="ct"></div>
<div class="status" id="st"></div>
<div class="hint">드래그로 회전 · 핀치로 확대</div>
<div class="nav"><button class="arw" id="prev">◀</button><button class="arw" id="next">▶</button></div>
<script type="module">
import * as THREE from './js/vendor/three.module.js';
import { GLTFLoader } from './js/vendor/GLTFLoader.js';
import { OrbitControls } from './js/vendor/OrbitControls.js';
import { HEROES, RARITY } from './js/data/heroes.js';

const ROSTER = HEROES.map(h => ({ id: h.id, name: h.name, rar: RARITY[h.rarity]?.name || '' }));
let idx = ROSTER.findIndex(h => h.id === 'guanyu'); if (idx < 0) idx = 0;

const cv = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true, alpha: true });
renderer.setClearAlpha(0); renderer.setPixelRatio(Math.min(2, devicePixelRatio || 1)); renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(38, 1, 0.1, 100); cam.position.set(0, 1.4, 6.5);
scene.add(new THREE.HemisphereLight(0xfff1da, 0x40301c, 1.25));
const key = new THREE.DirectionalLight(0xffe6b4, 1.7); key.position.set(3, 6, 5); key.castShadow = true;
key.shadow.mapSize.set(1024, 1024); key.shadow.camera.near = 1; key.shadow.camera.far = 20;
key.shadow.camera.left = -4; key.shadow.camera.right = 4; key.shadow.camera.top = 5; key.shadow.camera.bottom = -3; scene.add(key);
const fill = new THREE.DirectionalLight(0x88bbff, 0.5); fill.position.set(-4, 3, -3); scene.add(fill);
const disc = new THREE.Mesh(new THREE.CylinderGeometry(1.9, 2.05, 0.18, 48), new THREE.MeshStandardMaterial({ color: 0x4a3826, roughness: 0.85 }));
disc.position.y = -0.09; disc.receiveShadow = true; scene.add(disc);
const ring = new THREE.Mesh(new THREE.TorusGeometry(1.9, 0.04, 12, 60), new THREE.MeshStandardMaterial({ color: 0xe8c463, emissive: 0x6b4e16, roughness: 0.4, metalness: 0.6 }));
ring.rotation.x = Math.PI / 2; ring.position.y = 0.02; scene.add(ring);

const controls = new OrbitControls(cam, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08; controls.enablePan = false;
controls.minDistance = 3; controls.maxDistance = 10; controls.maxPolarAngle = Math.PI * 0.52;
controls.target.set(0, 1.05, 0); controls.autoRotate = true; controls.autoRotateSpeed = 1.0;

const loader = new GLTFLoader();
let current = null, token = 0;
const H0 = 2.3;
function load(i) {
  idx = (i + ROSTER.length) % ROSTER.length;
  const h = ROSTER[idx];
  document.getElementById('nm').textContent = h.name;
  document.getElementById('rr').textContent = h.rar ? '★ ' + h.rar : '';
  document.getElementById('ct').textContent = (idx + 1) + ' / ' + ROSTER.length;
  const my = ++token;
  const st = document.getElementById('st');
  st.innerHTML = '<span class="spin"></span>불러오는 중…';
  loader.load('./assets/models/' + h.id + '.glb', (g) => {
    if (my !== token) return;
    if (current) { scene.remove(current); }
    const m = g.scene;
    const box = new THREE.Box3().setFromObject(m); const sz = box.getSize(new THREE.Vector3());
    m.scale.setScalar(H0 / (sz.y || 1)); m.updateWorldMatrix(true, true);
    const b2 = new THREE.Box3().setFromObject(m); const c = b2.getCenter(new THREE.Vector3());
    m.position.x -= c.x; m.position.z -= c.z; m.position.y -= b2.min.y;
    m.traverse(o => { if (o.isMesh) o.castShadow = true; });
    scene.add(m); current = m; st.textContent = '';
    controls.target.set(0, H0 * 0.46, 0); cam.position.set(0, H0 * 0.55, H0 * 2.7); controls.update();
  }, undefined, () => {
    if (my !== token) return;
    if (current) { scene.remove(current); current = null; }
    st.innerHTML = '🛠️ 3D 생성 대기 중<br><span style="font-size:12px;opacity:.7">잠시 후 다시 열어보세요</span>';
  });
}
document.getElementById('prev').onclick = () => load(idx - 1);
document.getElementById('next').onclick = () => load(idx + 1);
addEventListener('keydown', e => { if (e.key === 'ArrowLeft') load(idx - 1); if (e.key === 'ArrowRight') load(idx + 1); });
function resize() { const w = innerWidth, h = innerHeight; renderer.setSize(w, h, false); cam.aspect = w / h; cam.updateProjectionMatrix(); }
addEventListener('resize', resize); resize();
renderer.setAnimationLoop(() => { controls.update(); renderer.render(scene, cam); });
load(idx);
</script>
</body></html>
